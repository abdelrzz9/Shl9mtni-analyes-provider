name: Math Engine CI

on:
  push:
    branches: [main]
    paths:
      - 'mathverse-engine/**'
  pull_request:
    branches: [main]
    paths:
      - 'mathverse-engine/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check mathverse-engine/
      - run: ruff format --check mathverse-engine/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          cd mathverse-engine
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest pytest-asyncio pytest-cov
      - run: |
          cd mathverse-engine
          python3 -m pytest tests/ -v --cov=engine --cov-report=term-missing
