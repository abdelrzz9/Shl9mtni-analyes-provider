name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'mathverse-flutter/**'
  pull_request:
    branches: [main]
    paths:
      - 'mathverse-flutter/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          working-directory: mathverse-flutter
      - run: flutter pub get
      - run: flutter analyze

  test:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          working-directory: mathverse-flutter
      - run: flutter pub get
      - run: flutter test --coverage
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: mathverse-flutter/coverage/
          flags: flutter

  build-web:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          working-directory: mathverse-flutter
      - run: flutter build web --release
