name: Go Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'mathverse-api/**'
  pull_request:
    branches: [main]
    paths:
      - 'mathverse-api/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: mathverse-api
          version: latest

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: cd mathverse-api && go test ./... -v -coverprofile=coverage.out -covermode=atomic
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: mathverse-api/
          flags: backend

  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run govulncheck
        run: |
          cd mathverse-api
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
