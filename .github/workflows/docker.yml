name: Docker Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Go API
        uses: docker/build-push-action@v6
        with:
          context: ./mathverse-api
          load: true
          tags: mathverse-api:latest

  build-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Python engine
        uses: docker/build-push-action@v6
        with:
          context: ./mathverse-engine
          load: true
          tags: mathverse-engine:latest

  build-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Flutter web
        uses: docker/build-push-action@v6
        with:
          context: ./mathverse-flutter
          load: true
          tags: mathverse-flutter:latest
