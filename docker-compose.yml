services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MATH_ENGINE_URL=http://math-engine:8000
      - JWT_SECRET=math-app-secret-key-change-in-production
      - GIN_MODE=release
    depends_on:
      math-engine:
        condition: service_started
    networks:
      - math-app-network

  math-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: math-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - math-app-network

networks:
  math-app-network:
    driver: bridge
