services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mathverse
      POSTGRES_PASSWORD: mathverse
      POSTGRES_DB: mathverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mathverse-api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathverse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mathverse-network
    restart: unless-stopped

  mathverse-engine:
    build:
      context: ./mathverse-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
      - CACHE_ENABLED=true
      - CORS_ORIGINS=http://localhost:3000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mathverse-network
    restart: unless-stopped

  mathverse-api:
    build:
      context: ./mathverse-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URL=postgres://mathverse:mathverse@postgres:5432/mathverse?sslmode=disable
      - MATH_ENGINE_URL=http://mathverse-engine:8000
      - JWT_SECRET=change-this-to-a-secure-random-string-in-production
      - GIN_MODE=release
      - LOG_LEVEL=info
      - APP_ENV=production
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - RATE_LIMIT_REQUESTS_PER_MIN=60
      - AUTH_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=168h
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_DURATION=15m
      - ENGINE_TIMEOUT=30s
    depends_on:
      postgres:
        condition: service_healthy
      mathverse-engine:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mathverse-network
    restart: unless-stopped

  mathverse-flutter:
    build:
      context: ./mathverse-flutter
    ports:
      - "3000:80"
    depends_on:
      - mathverse-api
    networks:
      - mathverse-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  mathverse-network:
    driver: bridge
